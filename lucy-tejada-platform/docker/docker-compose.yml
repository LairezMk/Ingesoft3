# ============================================
# DOCKER COMPOSE - LUCY TEJADA PLATFORM
# Orquestación de servicios para desarrollo
# ============================================

services:
  # ============================================
  # BASES DE DATOS
  # ============================================

  postgres:
    image: postgres:15-alpine
    container_name: lucy-tejada-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DATABASE_USER:-postgres}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-postgres123}
      POSTGRES_DB: ${DATABASE_NAME:-lucy_tejada_db}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d
    ports:
      - "${DATABASE_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lucy-tejada-network

  redis:
    image: redis:7-alpine
    container_name: lucy-tejada-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis123}
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lucy-tejada-network

  # ============================================
  # BACKEND SERVICES
  # ============================================

  auth-service:
    build:
      context: ..
      dockerfile: services/auth-service/Dockerfile
    container_name: lucy-tejada-auth
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      AUTH_SERVICE_PORT: 3001
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: ${DATABASE_NAME:-lucy_tejada_db}
      DATABASE_USER: ${DATABASE_USER:-postgres}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-postgres123}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis123}
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-min-64-chars-for-production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-your-refresh-secret-key-min-64-chars}
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - lucy-tejada-network

  academic-service:
    build:
      context: ..
      dockerfile: services/academic-service/Dockerfile
    container_name: lucy-tejada-academic
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      ACADEMIC_SERVICE_PORT: 3002
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: ${DATABASE_NAME:-lucy_tejada_db}
      DATABASE_USER: ${DATABASE_USER:-postgres}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-postgres123}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis123}
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-min-64-chars-for-production}
    ports:
      - "3002:3002"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - lucy-tejada-network

  # ============================================
  # API GATEWAY (NGINX)
  # ============================================

  nginx:
    image: nginx:alpine
    container_name: lucy-tejada-gateway
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    ports:
      - "3000:80"
      - "443:443"
    depends_on:
      - auth-service
      - academic-service
    networks:
      - lucy-tejada-network

  # ============================================
  # FRONTEND
  # ============================================

  frontend:
    build:
      context: ..
      dockerfile: frontend/web-app/Dockerfile
    container_name: lucy-tejada-frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:3000/api/v1
    ports:
      - "5173:80"
    depends_on:
      - nginx
    networks:
      - lucy-tejada-network

  # ============================================
  # HERRAMIENTAS DE DESARROLLO
  # ============================================

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: lucy-tejada-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@lucytejada.gov.co}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin123}
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres
    networks:
      - lucy-tejada-network
    profiles:
      - dev

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: lucy-tejada-redis-commander
    restart: unless-stopped
    environment:
      REDIS_HOSTS: local:redis:6379:0:${REDIS_PASSWORD:-redis123}
    ports:
      - "8081:8081"
    depends_on:
      - redis
    networks:
      - lucy-tejada-network
    profiles:
      - dev

# ============================================
# VOLUMES
# ============================================

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  pgadmin_data:
    driver: local

# ============================================
# NETWORKS
# ============================================

networks:
  lucy-tejada-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
